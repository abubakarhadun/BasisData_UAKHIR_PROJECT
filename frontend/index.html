<script>
    // Redirect to timeline if logged in, otherwise to login
    setTimeout(() => {
        if (isLoggedIn()) {
            window.location.href = 'pages/timeline.html';
        } else {
            window.location.href = 'pages/login.html';
        }
    }, 800);
</script>
